<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Drive</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  .status-card { background:var(--t-panel); border:1px solid var(--t-btn-border); border-radius:6px;
    padding:12px; margin-bottom:10px; }
  .status-row { display:flex; gap:10px; align-items:center; margin-bottom:6px; font-size:0.9em; }
  .status-label { color:#888; min-width:110px; }
  .status-value { color:#e0e0e0; font-family:monospace; }
  .status-ok { color:#2ecc71; }
  .status-err { color:#e74c3c; }

  .file-table { width:100%; border-collapse:collapse; font-size:0.85em; margin-top:8px; }
  .file-table th { text-align:left; color:#888; padding:4px 8px; border-bottom:1px solid #333; }
  .file-table td { padding:4px 8px; color:#ccc; font-family:monospace; border-bottom:1px solid #1a1a1a; }
  .file-table tr:hover td { background:rgba(255,255,255,0.03); }
  .file-size { color:#888; }

  .toolbar { display:flex; align-items:center; gap:10px; padding:8px 0; font-size:0.85em; }
  .toolbar button { padding:4px 12px; background:var(--t-btn); color:#ccc; border:1px solid var(--t-btn-border);
    border-radius:3px; cursor:pointer; font-family:monospace; }
  .toolbar button:hover { background:var(--t-btn-hover); }
  .toolbar .status-msg { color:#888; font-size:0.85em; }

  .not-configured { color:#666; text-align:center; padding:60px 0; font-size:1.1em; }
</style>
</head>
<body>

<div id="content">
  <div class="status-card" id="status-card">
    <div class="status-row"><span class="status-label">Status</span><span class="status-value" id="st-status">--</span></div>
    <div class="status-row"><span class="status-label">Remote</span><span class="status-value" id="st-remote">--</span></div>
    <div class="status-row"><span class="status-label">Folder</span><span class="status-value" id="st-folder">--</span></div>
    <div class="status-row"><span class="status-label">Storage</span><span class="status-value" id="st-storage">--</span></div>
    <div class="status-row"><span class="status-label">Tunnel URL</span><span class="status-value" id="st-tunnel">--</span></div>
  </div>

  <div class="toolbar">
    <button onclick="refreshFiles()">Refresh</button>
    <button onclick="publishTunnel()">Publish Tunnel URL</button>
    <span class="status-msg" id="action-status"></span>
  </div>

  <div id="files-container">
    <table class="file-table">
      <thead><tr><th>Name</th><th>Size</th><th>Modified</th><th>Type</th></tr></thead>
      <tbody id="files-body"><tr><td colspan="4" style="color:#666;">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div id="not-configured" class="not-configured" style="display:none;">
  Google Drive not configured.<br>
  Set <b>ENABLE_GDRIVE</b>, <b>GDRIVE_CREDENTIALS</b>, and <b>GDRIVE_FOLDER_ID</b> in the config.
</div>

<script>
function init() {
  loadStatus();
  loadFiles();
}

function loadStatus() {
  fetch('/api/gdrive/status').then(function(r){return r.json();}).then(function(d) {
    if (!d.configured) {
      document.getElementById('content').style.display = 'none';
      document.getElementById('not-configured').style.display = '';
      return;
    }
    var el = document.getElementById('st-status');
    if (d.authenticated && d.folder_accessible) {
      el.textContent = 'Connected';
      el.className = 'status-value status-ok';
    } else if (d.authenticated) {
      el.textContent = 'Auth OK (folder error: ' + (d.folder_error || '?') + ')';
      el.className = 'status-value status-err';
    } else {
      el.textContent = d.folder_error || 'Not connected';
      el.className = 'status-value status-err';
    }
    document.getElementById('st-remote').textContent = d.remote || '--';
    document.getElementById('st-folder').textContent = d.folder_path || '--';
    if (d.total_bytes) {
      var used = fmtBytes(d.used_bytes || 0);
      var total = fmtBytes(d.total_bytes || 0);
      var free = fmtBytes(d.free_bytes || 0);
      document.getElementById('st-storage').textContent = used + ' / ' + total + ' (' + free + ' free)';
    }
  }).catch(function(e) {
    document.getElementById('st-status').textContent = 'Error: ' + e.message;
    document.getElementById('st-status').className = 'status-value status-err';
  });

  // Also fetch tunnel URL
  fetch('/api/tunnel/link-url').then(function(r){return r.json();}).then(function(d) {
    var el = document.getElementById('st-tunnel');
    if (d.ws_link) {
      el.textContent = d.ws_link;
      el.className = 'status-value status-ok';
    } else {
      el.textContent = 'No tunnel active';
      el.className = 'status-value status-err';
    }
  }).catch(function(){});
}

function loadFiles() { refreshFiles(); }

function refreshFiles() {
  fetch('/api/gdrive/files').then(function(r){return r.json();}).then(function(d) {
    var tbody = document.getElementById('files-body');
    if (!d.files || !d.files.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#666;">No files</td></tr>';
      return;
    }
    var html = '';
    for (var i = 0; i < d.files.length; i++) {
      var f = d.files[i];
      var size = f.size ? fmtBytes(parseInt(f.size)) : '--';
      var mod = f.modifiedTime ? f.modifiedTime.replace('T',' ').replace('Z','').substring(0,19) : '--';
      var mime = (f.mimeType || '').split('/').pop().substring(0,20);
      html += '<tr><td>' + f.name + '</td><td class="file-size">' + size + '</td><td>' + mod + '</td><td>' + mime + '</td></tr>';
    }
    tbody.innerHTML = html;
  }).catch(function(e) {
    document.getElementById('files-body').innerHTML = '<tr><td colspan="4" style="color:#e74c3c;">Error: ' + e.message + '</td></tr>';
  });
}

function publishTunnel() {
  var el = document.getElementById('action-status');
  el.textContent = 'Publishing...';
  fetch('/api/gdrive/publish-tunnel', {method:'POST'}).then(function(r){return r.json();}).then(function(d) {
    if (d.ok) {
      el.textContent = 'Published tunnel URL to Drive';
      refreshFiles();
    } else {
      el.textContent = 'Error: ' + (d.error || 'unknown');
    }
  }).catch(function(e){ el.textContent = 'Error: ' + e.message; });
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b/1073741824).toFixed(1) + ' GB';
  if (b >= 1048576) return (b/1048576).toFixed(1) + ' MB';
  if (b >= 1024) return (b/1024).toFixed(0) + ' KB';
  return b + ' B';
}

init();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
