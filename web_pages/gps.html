<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPS</title>
<link rel="stylesheet" href="/pages/common.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .gps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 800px) { .gps-grid { grid-template-columns: 1fr; } }
  .gps-panel { background: var(--t-panel); border: 1px solid var(--t-border); border-radius: 6px; padding: 14px; font-family: monospace; font-size: 0.95em; }
  .gps-big { color: #2ecc71; font-size: 2em; text-align: center; letter-spacing: 1px; margin: 4px 0; }
  .gps-label { color: #888; font-size: 0.85em; }
  .gps-val { color: #e0e0e0; font-weight: bold; }
  .gps-row { display: flex; align-items: center; gap: 10px; margin: 4px 0; flex-wrap: wrap; }
  .gps-input { background: var(--t-btn,#0d1b2a); border: 1px solid var(--t-btn-border,#1b3a5c); color: #2ecc71;
    padding: 5px 8px; border-radius: 4px; font-family: monospace; font-size: 0.95em; width: 120px; text-align: center; }
  .gps-btn { padding: 5px 12px; border: 1px solid var(--t-btn-border,#1b3a5c); border-radius: 4px;
    background: var(--t-btn,#0d1b2a); color: #e0e0e0; cursor: pointer; font-family: monospace; font-size: 0.85em; }
  .gps-btn:hover { background: var(--t-btn-hover,#1a2744); border-color: var(--t-accent,#00d4ff); }
  #gps-map { height: 400px; border-radius: 6px; border: 1px solid var(--t-border); }
  .gps-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #00d4ff; border: 2px solid #fff;
    box-shadow: 0 0 6px rgba(0,212,255,0.7);
    animation: gps-pulse 2s ease-in-out infinite;
  }
  @keyframes gps-pulse {
    0%,100% { box-shadow: 0 0 4px rgba(0,212,255,0.5); }
    50% { box-shadow: 0 0 12px rgba(0,212,255,0.9); }
  }
  .sat-bar { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .sat-prn { min-width: 42px; text-align: right; color: #888; font-size: 0.8em; }
  .sat-track { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 2px; height: 14px; overflow: hidden; }
  .sat-fill { height: 100%; transition: width 0.5s; }
  .sat-snr { min-width: 28px; font-size: 0.8em; color: #ccc; }
</style>
</head><body>

<div class="gps-grid">
  <!-- Left column: map -->
  <div>
    <div class="gps-panel" style="padding:0; overflow:hidden;">
      <div id="gps-map"></div>
    </div>
  </div>

  <!-- Right column: status + sats -->
  <div>
    <div class="gps-panel" style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span style="color:var(--t-accent); font-weight:bold;">Position</span>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="gps-btn" id="gps-mode-btn" onclick="toggleMode()" title="Switch between simulated and real GPS">SIM</button>
          <span id="gps-fix-badge" style="font-weight:bold;"></span>
        </div>
      </div>
      <div class="gps-big" id="gps-pos">-- / --</div>
      <div class="gps-row" style="justify-content:center; gap:20px; margin-top:8px;">
        <div><span class="gps-label">Alt:</span> <span class="gps-val" id="gps-alt">--</span><span class="gps-label"> m</span></div>
        <div><span class="gps-label">Speed:</span> <span class="gps-val" id="gps-speed">--</span><span class="gps-label"> km/h</span></div>
        <div><span class="gps-label">Hdg:</span> <span class="gps-val" id="gps-hdg">--</span><span class="gps-label">&deg;</span></div>
      </div>
      <div class="gps-row" style="justify-content:center; gap:20px; margin-top:4px;">
        <div><span class="gps-label">HDOP:</span> <span class="gps-val" id="gps-hdop">--</span></div>
        <div><span class="gps-label">Sats:</span> <span class="gps-val" id="gps-sats">--</span></div>
        <div><span class="gps-label">Fix:</span> <span class="gps-val" id="gps-fix-time">--</span></div>
      </div>
    </div>

    <!-- Satellite chart -->
    <div class="gps-panel" style="margin-bottom:10px;">
      <div style="color:var(--t-accent); font-weight:bold; margin-bottom:6px;">Satellites in View</div>
      <div id="gps-sat-chart" style="max-height:280px; overflow-y:auto;">
        <span class="gps-label">Waiting for data...</span>
      </div>
    </div>
  </div>
</div>

<!-- Sim controls (only shown in simulate mode) -->
<div id="gps-sim-panel" class="gps-panel" style="display:none; margin-bottom:10px;">
  <div style="color:var(--t-accent); font-weight:bold; margin-bottom:8px;">Simulation Controls
    <span style="color:#f39c12; font-size:0.8em; margin-left:8px;">(click map to set position)</span>
  </div>
  <div class="gps-row">
    <span class="gps-label">Lat:</span>
    <input id="sim-lat" class="gps-input" type="text" value="33.7455">
    <span class="gps-label">Lon:</span>
    <input id="sim-lon" class="gps-input" type="text" value="-117.8677">
    <span class="gps-label">Alt (m):</span>
    <input id="sim-alt" class="gps-input" type="text" value="35" style="width:70px;">
    <span class="gps-label">Speed:</span>
    <input id="sim-speed" class="gps-input" type="text" value="0" style="width:60px;">
    <span class="gps-label">Hdg:</span>
    <input id="sim-hdg" class="gps-input" type="text" value="0" style="width:60px;">
    <button class="gps-btn" onclick="simSet()">Set</button>
  </div>
</div>

<script>
// --- Map init ---
var _map = L.map('gps-map').setView([33.7455, -117.8677], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19
}).addTo(_map);

var _dotIcon = L.divIcon({className: '', html: '<div class="gps-dot"></div>', iconSize: [14, 14], iconAnchor: [7, 7]});
var _marker = L.marker([33.7455, -117.8677], {icon: _dotIcon, zIndexOffset: 1000}).addTo(_map);
var _dopRing = L.circle([33.7455, -117.8677], {radius: 10, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.08, weight: 1.5, dashArray: '6,4'}).addTo(_map);
var _trail = L.polyline([], {color: '#2ecc71', weight: 2, opacity: 0.6}).addTo(_map);
var _trailPoints = [];
var _lastLat = 0, _lastLon = 0;
var _simMode = false;
var _mapFollowing = true;

// Click map to set sim position
_map.on('click', function(e) {
  if (!_simMode) return;
  document.getElementById('sim-lat').value = e.latlng.lat.toFixed(6);
  document.getElementById('sim-lon').value = e.latlng.lng.toFixed(6);
  simSet();
});

// Stop auto-follow when user drags
_map.on('dragstart', function() { _mapFollowing = false; });

function toggleMode() {
  var newMode = _simMode ? 'serial' : 'simulate';
  var btn = document.getElementById('gps-mode-btn');
  btn.style.color = '#f39c12';
  btn.textContent = 'Switching...';
  postJson('/gpscmd', {cmd:'switch_mode', mode:newMode})
    .then(function(d){
      if (!d.ok) { btn.style.color = '#e74c3c'; btn.textContent = 'Error'; }
    }).catch(function(){ btn.style.color = '#e74c3c'; btn.textContent = 'Error'; });
}

function simSet() {
  var body = {
    cmd: 'set_position',
    lat: parseFloat(document.getElementById('sim-lat').value),
    lon: parseFloat(document.getElementById('sim-lon').value),
    alt: parseFloat(document.getElementById('sim-alt').value),
    speed: parseFloat(document.getElementById('sim-speed').value),
    heading: parseFloat(document.getElementById('sim-hdg').value)
  };
  postJson('/gpscmd', body);
}

// --- Polling ---
function updateGps() {
  fetch('/gpsstatus').then(function(r){return r.json()}).then(function(d) {
    _simMode = d.simulated || false;
    document.getElementById('gps-sim-panel').style.display = _simMode ? '' : 'none';

    // Mode toggle button
    var modeBtn = document.getElementById('gps-mode-btn');
    if (_simMode) {
      modeBtn.textContent = 'SIM';
      modeBtn.style.color = '#f39c12';
      modeBtn.style.borderColor = '#f39c12';
      modeBtn.title = 'Switch to real GPS hardware';
    } else {
      modeBtn.textContent = 'LIVE';
      modeBtn.style.color = '#2ecc71';
      modeBtn.style.borderColor = '#2ecc71';
      modeBtn.title = 'Switch to simulated GPS';
    }

    // Fix badge
    var badge = document.getElementById('gps-fix-badge');
    if (!d.connected) {
      badge.innerHTML = '<span style="color:#e74c3c">Disconnected</span>';
    } else if (d.fix === 0) {
      badge.innerHTML = '<span style="color:#f39c12">No Fix</span>';
    } else if (d.fix === 1) {
      badge.innerHTML = '<span style="color:#2ecc71">GPS Fix</span>' + (_simMode ? ' <span style="color:#f39c12">(SIM)</span>' : '');
    } else {
      badge.innerHTML = '<span style="color:#2ecc71">DGPS Fix</span>';
    }

    // Position
    if (d.fix > 0) {
      document.getElementById('gps-pos').textContent = d.lat.toFixed(6) + ' / ' + d.lon.toFixed(6);
      document.getElementById('gps-alt').textContent = d.alt.toFixed(1);
      document.getElementById('gps-speed').textContent = d.speed.toFixed(1);
      document.getElementById('gps-hdg').textContent = d.heading.toFixed(0);
      document.getElementById('gps-hdop').textContent = d.hdop.toFixed(1);
      document.getElementById('gps-sats').textContent = d.satellites_used;
      document.getElementById('gps-fix-time').textContent = d.last_fix_time || '--';

      // Update map — DOP ring radius: HDOP * 5m (typical GPS CEP ≈ 5m)
      var ll = [d.lat, d.lon];
      _marker.setLatLng(ll);
      var dopRadius = Math.max(3, d.hdop * 5);
      _dopRing.setLatLng(ll);
      _dopRing.setRadius(dopRadius);
      // Color ring by accuracy: green < 10m, yellow 10-25m, red > 25m
      var ringClr = dopRadius < 10 ? '#2ecc71' : dopRadius < 25 ? '#f1c40f' : '#e74c3c';
      _dopRing.setStyle({color: ringClr, fillColor: ringClr});

      // Trail (only add if moved > ~10m)
      if (Math.abs(d.lat - _lastLat) > 0.0001 || Math.abs(d.lon - _lastLon) > 0.0001) {
        _trailPoints.push(ll);
        if (_trailPoints.length > 500) _trailPoints.shift();
        _trail.setLatLngs(_trailPoints);
        _lastLat = d.lat;
        _lastLon = d.lon;
      }

      if (_mapFollowing) _map.setView(ll);
    } else {
      document.getElementById('gps-pos').textContent = '-- / --';
      document.getElementById('gps-alt').textContent = '--';
      document.getElementById('gps-speed').textContent = '--';
      document.getElementById('gps-hdg').textContent = '--';
      document.getElementById('gps-hdop').textContent = '--';
      document.getElementById('gps-sats').textContent = '--';
      document.getElementById('gps-fix-time').textContent = '--';
    }

    // Satellite bars
    var sats = d.satellites || [];
    var ch = '';
    for (var i = 0; i < sats.length; i++) {
      var s = sats[i];
      var pct = Math.min(100, Math.round(s.snr * 100 / 50));
      var clr = s.snr >= 35 ? '#2ecc71' : s.snr >= 20 ? '#f1c40f' : '#e74c3c';
      if (s.snr === 0) clr = '#555';
      ch += '<div class="sat-bar">';
      ch += '<span class="sat-prn">PRN ' + s.prn + '</span>';
      ch += '<div class="sat-track"><div class="sat-fill" style="width:' + pct + '%;background:' + clr + ';"></div></div>';
      ch += '<span class="sat-snr">' + s.snr + '</span>';
      ch += '</div>';
    }
    if (!ch) ch = '<span class="gps-label">No satellites in view</span>';
    document.getElementById('gps-sat-chart').innerHTML = ch;

  }).catch(function(){});
}

setInterval(updateGps, 2000);
updateGps();

// Re-center button
var _recenterBtn = L.control({position: 'topright'});
_recenterBtn.onAdd = function() {
  var d = L.DomUtil.create('div', 'leaflet-bar');
  d.innerHTML = '<a href="#" title="Re-center" style="font-size:18px;line-height:26px;display:block;width:26px;height:26px;text-align:center;text-decoration:none;color:#333;background:#fff;">&#8982;</a>';
  d.onclick = function(e) { e.preventDefault(); e.stopPropagation(); _mapFollowing = true; return false; };
  return d;
};
_recenterBtn.addTo(_map);
</script>
</body></html>
