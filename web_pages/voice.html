<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice Relay</title>
<link rel="stylesheet" href="/pages/common.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .main-layout {
    display: flex;
    gap: var(--s-3);
    flex: 1;
    min-height: 0;
  }
  .voice-panel, .tmux-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #transcript {
    flex: 1;
    min-height: 120px;
    width: 100%;
    padding: var(--s-3);
    border-radius: var(--r-md);
    border: 1px solid var(--t-border-hi);
    background: var(--t-panel);
    color: var(--t-text);
    font: inherit;
    font-size: var(--f-md);
    resize: vertical;
    line-height: 1.5;
  }
  #transcript::placeholder { color: var(--t-text-mute); }
  #transcript:focus { border-color: var(--t-accent); outline: none; }

  #tmuxView {
    flex: 1;
    min-height: 200px;
    padding: var(--s-2);
    border-radius: var(--r-md);
    border: 1px solid var(--t-border-hi);
    background: var(--t-bg);
    color: var(--t-text-dim);
    font-family: inherit;
    font-size: var(--f-xs);
    line-height: 1.3;
    overflow: auto;
    white-space: pre;
    word-wrap: normal;
  }

  .tmux-header {
    font-size: var(--f-xs);
    color: var(--t-text-dim);
    margin-bottom: var(--s-1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .session-controls {
    display: flex;
    gap: var(--s-1);
    margin-top: var(--s-2);
  }
  .session-controls .rb { flex: 1; }

  .controls {
    display: flex;
    gap: var(--s-2);
    margin-bottom: var(--s-3);
    flex-wrap: wrap;
  }
  .controls .rb {
    flex: 1;
    min-width: 80px;
    padding: var(--s-2) var(--s-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #micBtn.recording {
    color: var(--t-err);
    border-color: var(--t-err);
    animation: mic-pulse 1.5s infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--t-err) 40%, transparent); }
    50%      { box-shadow: 0 0 0 10px color-mix(in srgb, var(--t-err) 0%,  transparent); }
  }

  .mode-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--s-3);
    margin-top: var(--s-3);
    font-size: var(--f-sm);
    color: var(--t-text-dim);
    flex-wrap: wrap;
  }
  .mode-toggle label {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--s-1);
  }
  .mode-toggle select {
    background: var(--t-btn);
    color: var(--t-text);
    border: 1px solid var(--t-border);
    border-radius: var(--r-sm);
    padding: 2px var(--s-1);
    font: inherit;
    font-size: var(--f-xs);
  }

  .status-bar {
    margin-top: var(--s-3);
    padding: var(--s-2) var(--s-3);
    border-radius: var(--r-sm);
    background: var(--t-panel);
    border: 1px solid var(--t-border);
    font-size: var(--f-sm);
    color: var(--t-text-dim);
    text-align: center;
    min-height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.03em;
  }
  .status-bar.ok  { color: var(--t-ok);  border-left: 3px solid var(--t-ok); }
  .status-bar.err { color: var(--t-err); border-left: 3px solid var(--t-err); }

  .shortcuts {
    margin-top: var(--s-3);
    font-size: var(--f-xs);
    color: var(--t-text-mute);
    text-align: center;
    line-height: 1.8;
    letter-spacing: 0.04em;
  }
  .shortcuts kbd {
    background: var(--t-btn);
    border: 1px solid var(--t-border-hi);
    color: var(--t-accent);
    padding: 1px var(--s-1);
    border-radius: var(--r-sm);
    font-family: inherit;
    font-size: var(--f-xs);
  }

  @media (max-width: 700px) {
    .main-layout { flex-direction: column; }
    #tmuxView { min-height: 200px; }
  }
</style>
</head>
<body>

<div class="main-layout">
  <div class="voice-panel">
    <div class="controls">
      <button id="micBtn" class="rb rb-primary"><span class="icon icon-mic"></span> Mic</button>
      <button id="sendBtn" class="rb rb-primary">Send</button>
      <button id="clearBtn" class="rb">Clear</button>
    </div>

    <div class="mode-toggle">
      <label>
        <input type="checkbox" id="autoSendToggle">
        Auto-send after silence
      </label>
      <label>
        Delay:
        <select id="silenceDelay">
          <option value="1500">1.5s</option>
          <option value="2000" selected>2s</option>
          <option value="3000">3s</option>
          <option value="5000">5s</option>
        </select>
      </label>
    </div>

    <textarea id="transcript" placeholder="Transcribed text appears here. You can also type directly."></textarea>

    <div class="status-bar" id="statusBar">Ready</div>

    <div class="shortcuts">
      <kbd>Ctrl+Enter</kbd> Send &nbsp;
      <kbd>Esc</kbd> Clear &nbsp;
      <kbd>Ctrl+M</kbd> Mic &nbsp;
      <kbd>Ctrl+Shift+M</kbd> Auto-send
    </div>
  </div>

  <div class="tmux-panel">
    <div class="tmux-header">
      <span>tmux session</span>
      <label class="tgl">
        <input type="checkbox" id="autoScrollToggle" checked>
        Auto-scroll
      </label>
    </div>
    <div id="tmuxView">Connecting...</div>
    <div class="session-controls">
      <button id="startBtn" class="rb rb-sm" onclick="sessionAction('start')">Start tmux</button>
      <button id="restartBtn" class="rb rb-sm rb-danger" onclick="sessionAction('restart')">New Claude</button>
      <button id="stopBtn" class="rb rb-sm rb-danger" onclick="sessionAction('stop')">Stop</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const transcript   = $('transcript');
const micBtn       = $('micBtn');
const sendBtn      = $('sendBtn');
const clearBtn     = $('clearBtn');
const autoToggle   = $('autoSendToggle');
const silenceDelay = $('silenceDelay');
const statusBar    = $('statusBar');
const tmuxView     = $('tmuxView');
const autoScroll   = $('autoScrollToggle');

function setStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className = 'status-bar' + (type ? ' ' + type : '');
}

(async () => {
  try {
    const res = await fetch('/voice/status');
    const data = await res.json();
    if (data.session_alive) {
      setStatus('Connected \u2014 tmux session "' + data.tmux_target + '" is alive', 'ok');
    } else {
      setStatus('tmux session "' + data.tmux_target + '" not found', 'err');
    }
  } catch (e) {
    setStatus('Connection error: ' + e.message, 'err');
  }
})();

async function sendText() {
  const text = transcript.value.trim();
  if (!text) return;
  try {
    const res = await fetch('/voice/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.ok) {
      setStatus('Sent: "' + (text.length > 60 ? text.slice(0, 60) + '...' : text) + '"', 'ok');
      transcript.value = '';
      finalTranscript = '';
    } else {
      setStatus('Error: ' + (data.error || 'unknown'), 'err');
    }
  } catch (e) {
    setStatus('Send failed: ' + e.message, 'err');
  }
}

sendBtn.addEventListener('click', sendText);
clearBtn.addEventListener('click', () => {
  transcript.value = '';
  finalTranscript = '';
  setStatus('Cleared', '');
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;
let finalTranscript = '';
let autoSendTimer = null;

if (!SpeechRecognition) {
  micBtn.textContent = 'No Speech API';
  micBtn.disabled = true;
  setStatus('Web Speech API not available in this browser', 'err');
}

function startRecognition() {
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let interim = '';
    finalTranscript = '';
    for (let i = 0; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) {
        finalTranscript += result[0].transcript;
      } else {
        interim += result[0].transcript;
      }
    }
    transcript.value = finalTranscript + (interim ? interim : '');

    if (autoToggle.checked && finalTranscript.trim()) {
      clearTimeout(autoSendTimer);
      autoSendTimer = setTimeout(() => {
        if (transcript.value.trim()) sendText();
      }, parseInt(silenceDelay.value));
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') return;
    setStatus('Speech error: ' + event.error, 'err');
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.start();
}

function toggleMic() {
  if (!SpeechRecognition) return;
  isRecording = !isRecording;
  if (isRecording) {
    micBtn.innerHTML = '<span class="icon icon-mic"></span> Mic';
    micBtn.classList.add('recording');
    finalTranscript = transcript.value;
    startRecognition();
    setStatus('Listening...', '');
  } else {
    micBtn.innerHTML = '<span class="icon icon-mic"></span> Mic';
    micBtn.classList.remove('recording');
    if (recognition) recognition.stop();
    clearTimeout(autoSendTimer);
    setStatus('Mic off', '');
  }
}

micBtn.addEventListener('click', toggleMic);

async function pollTmuxView() {
  try {
    const res = await fetch('/voice/view');
    if (!res.ok) {
      tmuxView.textContent = '(session not available)';
      return;
    }
    const data = await res.json();
    tmuxView.textContent = data.content || '(empty)';
    if (autoScroll.checked) {
      tmuxView.scrollTop = tmuxView.scrollHeight;
    }
  } catch (e) {
    tmuxView.textContent = '(connection error)';
  }
}

pollTmuxView();
setInterval(pollTmuxView, 500);

async function sessionAction(action) {
  const btns = document.querySelectorAll('.session-controls button');
  btns.forEach(b => b.disabled = true);
  setStatus(action === 'start' ? 'Starting Claude...' : action === 'restart' ? 'Restarting Claude...' : 'Stopping...', '');
  try {
    const res = await fetch('/voice/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    });
    const data = await res.json();
    setStatus(data.msg || data.error || 'done', data.ok ? 'ok' : 'err');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
  setTimeout(() => btns.forEach(b => b.disabled = false), 2000);
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    sendText();
  }
  if (e.key === 'Escape') {
    e.preventDefault();
    transcript.value = '';
    finalTranscript = '';
    setStatus('Cleared', '');
  }
  if (e.ctrlKey && !e.shiftKey && e.key.toLowerCase() === 'm') {
    e.preventDefault();
    toggleMic();
  }
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'm') {
    e.preventDefault();
    autoToggle.checked = !autoToggle.checked;
    setStatus('Auto-send: ' + (autoToggle.checked ? 'ON' : 'OFF'), '');
  }
});
</script>
</body>
</html>
