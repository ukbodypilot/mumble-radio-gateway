<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repeaters</title>
<link rel="stylesheet" href="/pages/common.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .rpt-controls { display:flex; gap:var(--s-2); align-items:center; flex-wrap:wrap; margin-bottom:var(--s-2); }
  .rpt-select {
    background:var(--t-btn); border:1px solid var(--t-border);
    color:var(--t-text); padding:var(--s-1) var(--s-2);
    border-radius:var(--r-sm); font:inherit; font-size:var(--f-sm);
  }
  .rpt-ctl-label { color:var(--t-text-dim); font-size:var(--f-sm); }

  #rpt-map { height:300px; border-radius:var(--r-md); border:1px solid var(--t-border); margin-bottom:var(--s-3); }

  .rpt-panel-tight { margin-bottom:var(--s-2); }
  .rpt-panel-scroll { max-height:400px; overflow-y:auto; }

  table { width:100%; border-collapse:collapse; font-size:var(--f-sm); }
  th {
    text-align:left; color:var(--t-accent);
    border-bottom:1px solid var(--t-border);
    padding:var(--s-1) var(--s-2);
    font-size:var(--f-xs); font-weight:600;
    letter-spacing:0.06em; text-transform:uppercase;
    position:sticky; top:0; background:var(--t-panel);
  }
  td { padding:var(--s-1) var(--s-2); border-bottom:1px solid var(--t-border); white-space:nowrap; }
  tr { cursor:pointer; }
  tr:hover     { background:color-mix(in srgb, var(--t-accent) 6%, transparent); }
  tr.selected  { background:color-mix(in srgb, var(--t-accent) 14%, transparent); }
  tr.sdr-master{ background:color-mix(in srgb, var(--t-accent) 10%, transparent); }
  tr.sdr-slave { background:color-mix(in srgb, var(--t-warn) 10%, transparent); }

  .rpt-open   { color:var(--t-ok); }
  .rpt-closed { color:var(--t-err); }
  .rpt-status { font-size:var(--f-xs); margin-left:var(--s-2); color:var(--t-text-dim); }
  #rpt-count  { color:var(--t-accent); font-weight:600; }

  .sdr-bar { display:flex; gap:var(--s-3); align-items:center; flex-wrap:wrap; }
  .sdr-slot { display:flex; align-items:center; gap:var(--s-2); }
  .sdr-label { font-weight:600; font-size:var(--f-sm); letter-spacing:0.04em; }
  .sdr-label.master { color:var(--t-accent); }
  .sdr-label.slave  { color:var(--t-warn); }
  .sdr-freq { color:var(--t-accent); min-width:100px; font-variant-numeric:tabular-nums; }
  .sdr-call { color:var(--t-text-dim); min-width:80px; }
  .sdr-clear { cursor:pointer; color:var(--t-err); font-size:var(--f-md); line-height:1; padding:0 var(--s-1); }
  .sdr-clear:hover { color:var(--t-text); }
  .set-btn { font-size:var(--f-sm); font-weight:700; letter-spacing:0.08em; }
  .set-btn:disabled { opacity:0.3; cursor:default; }

  .rpt-row-btn { padding:1px var(--s-1); font-size:var(--f-xs); }
  .rb.active-master { background:var(--t-accent); color:var(--t-bg); border-color:var(--t-accent); }
  .rb.active-slave  { background:var(--t-warn);   color:var(--t-bg); border-color:var(--t-warn); }
</style>
</head><body>

<div id="rpt-map"></div>

<!-- SDR assignment bar -->
<div class="panel rpt-panel-tight">
  <div class="sdr-bar">
    <div class="sdr-slot">
      <span class="sdr-label master">SDR1 (Master):</span>
      <span class="sdr-freq" id="sdr1-freq">--</span>
      <span class="sdr-call" id="sdr1-call"></span>
      <span class="sdr-clear" id="sdr1-clear" onclick="clearSdr(1)" style="display:none;">&times;</span>
    </div>
    <div class="sdr-slot">
      <span class="sdr-label slave">SDR2 (Slave):</span>
      <span class="sdr-freq" id="sdr2-freq">--</span>
      <span class="sdr-call" id="sdr2-call"></span>
      <span class="sdr-clear" id="sdr2-clear" onclick="clearSdr(2)" style="display:none;">&times;</span>
    </div>
    <button class="rb rb-primary set-btn" id="sdr-set-btn" onclick="sdrSet()" disabled>SET</button>
    <span class="rpt-status" id="sdr-status"></span>
  </div>
</div>

<div class="panel rpt-panel-tight">
  <div class="rpt-controls">
    <label class="rpt-ctl-label">Band:</label>
    <select id="filt-band" class="rpt-select" onchange="loadRepeaters()">
      <option value="">All</option>
      <option value="6m">6m</option>
      <option value="2m">2m</option>
      <option value="1.25m">1.25m</option>
      <option value="70cm">70cm</option>
      <option value="33cm">33cm</option>
      <option value="23cm">23cm</option>
    </select>
    <label class="rpt-ctl-label">Radius:</label>
    <select id="filt-radius" class="rpt-select" onchange="loadRepeaters()">
      <option value="10">10 km</option>
      <option value="25">25 km</option>
      <option value="50" selected>50 km</option>
      <option value="100">100 km</option>
      <option value="200">200 km</option>
    </select>
    <label class="tgl"><input type="checkbox" id="filt-operational" checked onchange="loadRepeaters()"> Operational only</label>
    <button class="rb rb-sm" onclick="loadRepeaters()">Refresh</button>
    <span id="rpt-count">--</span>
    <span class="rpt-status" id="rpt-status"></span>
  </div>
</div>

<div class="panel rpt-panel-scroll">
  <table>
    <thead>
      <tr>
        <th>Dist</th><th>Call</th><th>Output</th><th>Input</th><th>PL</th>
        <th>Band</th><th>City</th><th>Open</th><th>SDR</th><th>Tune</th>
      </tr>
    </thead>
    <tbody id="rpt-body">
      <tr><td colspan="10" class="rpt-status">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
var _map = L.map('rpt-map').setView([33.7455, -117.8677], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 19
}).addTo(_map);

var _css = getComputedStyle(document.documentElement);
var _cAccent = _css.getPropertyValue('--t-accent').trim() || '#4fd6e6';
var _cOk     = _css.getPropertyValue('--t-ok').trim()     || '#5dc47a';
var _cErr    = _css.getPropertyValue('--t-err').trim()    || '#e04848';
var _cWarn   = _css.getPropertyValue('--t-warn').trim()   || '#e89d3c';

var _gpsMarker = L.circleMarker([33.7455, -117.8677], {radius:8, color:_cAccent, fillColor:_cAccent, fillOpacity:0.8, weight:2}).addTo(_map);
var _markers = L.layerGroup().addTo(_map);
var _repeaters = [];
var _sdr1 = null;  // {idx, freq, callsign}
var _sdr2 = null;

function assignSdr(channel, idx) {
  var r = _repeaters[idx];
  if (!r) return;
  var assignment = {idx: idx, freq: r.outputFrequency, callsign: r.callsign};
  if (channel === 1) _sdr1 = assignment;
  else _sdr2 = assignment;
  updateSdrBar();
  highlightRows();
}

function clearSdr(channel) {
  if (channel === 1) _sdr1 = null;
  else _sdr2 = null;
  updateSdrBar();
  highlightRows();
}

function updateSdrBar() {
  document.getElementById('sdr1-freq').textContent = _sdr1 ? _sdr1.freq.toFixed(4) + ' MHz' : '--';
  document.getElementById('sdr1-call').textContent = _sdr1 ? _sdr1.callsign : '';
  document.getElementById('sdr1-clear').style.display = _sdr1 ? '' : 'none';
  document.getElementById('sdr2-freq').textContent = _sdr2 ? _sdr2.freq.toFixed(4) + ' MHz' : '--';
  document.getElementById('sdr2-call').textContent = _sdr2 ? _sdr2.callsign : '';
  document.getElementById('sdr2-clear').style.display = _sdr2 ? '' : 'none';
  document.getElementById('sdr-set-btn').disabled = !_sdr1 && !_sdr2;
}

function highlightRows() {
  var rows = document.querySelectorAll('#rpt-body tr');
  for (var i = 0; i < rows.length; i++) {
    rows[i].classList.remove('sdr-master', 'sdr-slave');
  }
  if (_sdr1) {
    var r1 = document.getElementById('rpt-row-' + _sdr1.idx);
    if (r1) r1.classList.add('sdr-master');
  }
  if (_sdr2) {
    var r2 = document.getElementById('rpt-row-' + _sdr2.idx);
    if (r2) r2.classList.add('sdr-slave');
  }
  // Update button styles
  var btns = document.querySelectorAll('.master-btn, .slave-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active-master', 'active-slave');
  }
  if (_sdr1) {
    var mb = document.getElementById('master-' + _sdr1.idx);
    if (mb) mb.classList.add('active-master');
  }
  if (_sdr2) {
    var sb = document.getElementById('slave-' + _sdr2.idx);
    if (sb) sb.classList.add('active-slave');
  }
}

function sdrSet() {
  if (!_sdr1 && !_sdr2) return;
  var btn = document.getElementById('sdr-set-btn');
  btn.disabled = true;
  btn.textContent = 'TUNING...';
  document.getElementById('sdr-status').textContent = '';

  // Build a single tune command with both frequencies
  var cmd = {cmd: 'tune'};
  if (_sdr1) cmd.frequency = _sdr1.freq;
  if (_sdr2) cmd.frequency2 = _sdr2.freq;

  postJson('/sdrcmd', cmd)
    .then(function(d){
      btn.textContent = 'SET';
      btn.disabled = false;
      var ss = document.getElementById('sdr-status');
      ss.className = 'rpt-status';
      if (d.ok) {
        var parts = [];
        if (_sdr1) parts.push('SDR1→' + _sdr1.freq.toFixed(3));
        if (_sdr2) parts.push('SDR2→' + _sdr2.freq.toFixed(3));
        ss.classList.add('green');
        ss.textContent = parts.join(', ') + ' — restarting (~12s)';
      } else {
        ss.classList.add('red');
        ss.textContent = 'Error: ' + (d.error || 'unknown');
      }
    }).catch(function(e){
      btn.textContent = 'SET';
      btn.disabled = false;
      var ss = document.getElementById('sdr-status');
      ss.className = 'rpt-status red';
      ss.textContent = 'Error: ' + e.message;
    });
}

function loadRepeaters() {
  var band = document.getElementById('filt-band').value;
  var radius = document.getElementById('filt-radius').value;
  var operational = document.getElementById('filt-operational').checked;
  var url = '/repeaterstatus?radius=' + radius + '&operational=' + operational;
  if (band) url += '&band=' + band;

  document.getElementById('rpt-status').textContent = 'Loading...';

  fetch(url).then(function(r){return r.json()}).then(function(d) {
    _repeaters = d.repeaters || [];
    var status = d.status || {};
    document.getElementById('rpt-count').textContent = _repeaters.length + ' repeaters';
    document.getElementById('rpt-status').textContent = status.states ? 'from ' + status.states.join(', ') : '';

    // Update GPS position
    fetch('/gpsstatus').then(function(r){return r.json()}).then(function(g) {
      if (g.fix > 0) {
        _gpsMarker.setLatLng([g.lat, g.lon]);
        _map.setView([g.lat, g.lon]);
      }
    }).catch(function(){});

    // Re-map SDR assignments to new indices (callsign+freq match)
    if (_sdr1) { _sdr1 = _remapAssignment(_sdr1); }
    if (_sdr2) { _sdr2 = _remapAssignment(_sdr2); }
    updateSdrBar();

    // Build table
    var tbody = document.getElementById('rpt-body');
    var html = '';
    for (var i = 0; i < _repeaters.length; i++) {
      var r = _repeaters[i];
      var pl = r.ctcssTx || '';
      var openCls = r.isOpen ? 'rpt-open' : 'rpt-closed';
      var openTxt = r.isOpen === true ? 'Open' : r.isOpen === false ? 'Closed' : '?';
      html += '<tr onclick="selectRepeater(' + i + ')" id="rpt-row-' + i + '">';
      html += '<td>' + r.distance_km + '</td>';
      html += '<td>' + r.callsign + '</td>';
      html += '<td>' + r.outputFrequency.toFixed(4) + '</td>';
      html += '<td>' + r.inputFrequency.toFixed(4) + '</td>';
      html += '<td>' + pl + '</td>';
      html += '<td>' + (r.band || '') + '</td>';
      html += '<td>' + (r.nearestCity || '') + '</td>';
      html += '<td class="' + openCls + '">' + openTxt + '</td>';
      html += '<td>';
      html += '<button class="rb rb-sm rpt-row-btn master-btn" id="master-' + i + '" onclick="event.stopPropagation();assignSdr(1,' + i + ')" title="Assign to SDR1 (Master)">M</button> ';
      html += '<button class="rb rb-sm rpt-row-btn slave-btn" id="slave-' + i + '" onclick="event.stopPropagation();assignSdr(2,' + i + ')" title="Assign to SDR2 (Slave)">S</button>';
      html += '</td>';
      html += '<td><button class="rb rb-sm rpt-row-btn" onclick="event.stopPropagation();tuneRepeater(' + i + ')">Tune</button></td>';
      html += '</tr>';
    }
    if (!html) html = '<tr><td colspan="10" class="rpt-status">No repeaters found</td></tr>';
    tbody.innerHTML = html;
    highlightRows();

    // Update map markers
    _markers.clearLayers();
    for (var i = 0; i < _repeaters.length; i++) {
      var r = _repeaters[i];
      var color = r.band === '2m' ? _cOk : r.band === '70cm' ? _cErr : _cWarn;
      var m = L.circleMarker([r.latitude, r.longitude], {
        radius: 5, color: color, fillColor: color, fillOpacity: 0.7, weight: 1
      });
      m.bindPopup('<b>' + r.callsign + '</b><br>' + r.outputFrequency.toFixed(4) + ' MHz<br>PL ' + (r.ctcssTx || 'none') + '<br>' + (r.nearestCity || '') + '<br>' + r.distance_km + ' km');
      m._rptIdx = i;
      m.on('click', function(e) { selectRepeater(e.target._rptIdx); });
      _markers.addLayer(m);
    }
  }).catch(function(e) {
    document.getElementById('rpt-status').textContent = 'Error: ' + e.message;
  });
}

function _remapAssignment(a) {
  // Find the same repeater in the new list by callsign + freq
  for (var i = 0; i < _repeaters.length; i++) {
    if (_repeaters[i].callsign === a.callsign && Math.abs(_repeaters[i].outputFrequency - a.freq) < 0.001) {
      return {idx: i, freq: a.freq, callsign: a.callsign};
    }
  }
  return null; // repeater no longer in list
}

function selectRepeater(idx) {
  var rows = document.querySelectorAll('#rpt-body tr');
  for (var i = 0; i < rows.length; i++) rows[i].classList.remove('selected');
  var row = document.getElementById('rpt-row-' + idx);
  if (row) { row.classList.add('selected'); row.scrollIntoView({block:'nearest'}); }
  var r = _repeaters[idx];
  if (r) _map.setView([r.latitude, r.longitude], 13);
}

function tuneRepeater(idx) {
  var r = _repeaters[idx];
  if (!r) return;
  var body = {cmd:'freq', args:String(r.outputFrequency)};
  postJson('/kv4pcmd', body)
    .then(function(d){
      if (d.ok) {
        if (r.ctcssTx) {
          postJson('/kv4pcmd', {cmd:'ctcss', args:r.ctcssTx + ' 0'});
        }
        document.getElementById('rpt-status').textContent = 'Tuned KV4P to ' + r.callsign;
      } else {
        document.getElementById('rpt-status').textContent = 'Tune failed: ' + (d.error || '');
      }
    }).catch(function(e){ document.getElementById('rpt-status').textContent = 'Tune error'; });
}

loadRepeaters();
</script>
</body></html>
